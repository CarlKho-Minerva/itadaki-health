<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=600, height=600, initial-scale=1" />
    <meta name="description" content="Itadaki Health notification HUD for Meta Ray-Ban Display." />
    <meta name="mrb-compatible" content="yes" />
    <title>Itadaki HUD</title>
    <link rel="stylesheet" href="/glasses/styles.css" />
  </head>
  <body>
    <main class="hud" aria-label="Itadaki Health meal notification HUD">
      <section id="idle" class="screen active" aria-live="polite">
        <button id="arm-button" class="arm-button" type="button" aria-label="Arm Itadaki audio and refresh">
          <span></span>
        </button>
      </section>

      <section id="pulse" class="screen hidden" aria-live="assertive">
        <p class="kicker">Meal logged</p>
        <div class="calorie-line">
          <span>Calories</span>
          <strong id="calories">--</strong>
        </div>
        <div class="macro-grid" aria-label="Meal macro estimate">
          <p><span>Protein</span><strong id="protein">--g</strong></p>
          <p><span>Carbs</span><strong id="carbs">--g</strong></p>
          <p><span>Fat</span><strong id="fat">--g</strong></p>
        </div>
        <p id="trend" class="trend">Five-meal trend saved.</p>
      </section>
    </main>
    <script src="/glasses/app.js"></script>
  </body>
</html>
