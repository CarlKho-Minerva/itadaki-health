<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=600, height=600, initial-scale=1" />
    <meta name="description" content="Itadaki Health calories MVP for Meta Ray-Ban Display." />
    <meta name="mrb-compatible" content="yes" />
    <title>Itadaki Calories</title>
    <link rel="stylesheet" href="/glasses/styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Itadaki Health calories MVP">
      <section id="listen" class="screen active">
        <p class="kicker">Itadaki</p>
        <h1>Say itadakimasu</h1>
        <p id="listen-status" class="hint">Listen for 2.6s, or tap Trigger.</p>
        <div class="actions">
          <button class="focusable" data-action="listen">Listen</button>
          <button class="focusable" data-action="trigger">Trigger</button>
        </div>
      </section>

      <section id="image" class="screen hidden">
        <p class="kicker">Image</p>
        <h1>Add food</h1>
        <p id="image-status" class="hint">Photo if supported. Sample if not.</p>
        <input id="photo-input" type="file" accept="image/*" capture="environment" hidden />
        <div class="actions">
          <button class="focusable" data-action="photo">Photo</button>
          <button class="focusable" data-action="sample">Sample</button>
        </div>
      </section>

      <section id="loading" class="screen hidden">
        <p class="kicker">Grok</p>
        <h1>Estimating</h1>
        <p class="hint">Food image to calories.</p>
      </section>

      <section id="result" class="screen hidden">
        <p class="kicker">Calories</p>
        <h1 id="calories">705</h1>
        <p id="meal-name" class="hint">Sweetgreen Harvest Bowl</p>
        <div class="actions">
          <button class="focusable" data-action="log">Log</button>
          <button class="focusable" data-action="restart">Again</button>
        </div>
      </section>

      <section id="saved" class="screen hidden">
        <p class="kicker">CSV</p>
        <h1>Logged</h1>
        <p id="saved-row" class="hint">Meal row saved.</p>
        <button class="focusable solo" data-action="restart">Done</button>
      </section>
    </main>
    <script src="/glasses/app.js"></script>
  </body>
</html>
